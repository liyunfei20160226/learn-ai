<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">分类 - 项目集合</title>
    <link rel="stylesheet" href="/static/category.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">
                <span class="title-emoji" id="categoryEmoji"></span>
                <span id="categoryName"></span>
                <span class="title-emoji" id="categoryEmoji2"></span>
            </h1>
            <p class="subtitle" id="categoryDescription"></p>
        </header>

        <main class="main">
            <div class="project-grid" id="projectGrid">
                <!-- JavaScript 动态填充项目卡片 -->
            </div>

            <div class="back-link">
                <a href="/">← 返回项目主页</a>
            </div>
        </main>

        <footer class="footer">
            <p>用 ❤️ 构建 with FastAPI + 原生 JavaScript</p>
        </footer>
    </div>

    <script>
        // 分类信息
        const categoryInfo = {
            tools: {
                name: '效率工具类',
                emoji: '⚙️',
                description: '提升工作效率的实用工具'
            },
            games: {
                name: '游戏类',
                emoji: '🎮',
                description: '休闲娱乐小游戏'
            }
        };

        // 项目数据
        const projects = {
            tools: [
                {
                    name: '待办清单',
                    icon: '📝',
                    description: '优雅的待办事项管理工具，支持增删改查、筛选和一键清空已完成',
                    url: '/todo',
                    tag: '效率工具'
                }
            ],
            games: [
                {
                    name: '贪吃蛇',
                    icon: '🐍',
                    description: '经典贪吃蛇小游戏，HTML5 Canvas 绘制，原生 JavaScript 实现',
                    url: '/snake',
                    tag: '游戏'
                },
                {
                    name: '数独',
                    icon: '🔢',
                    description: '经典数独益智游戏，三种难度可选，自动生成题目，检查解答',
                    url: '/sudoku',
                    tag: '游戏'
                },
                {
                    name: '扫雷',
                    icon: '💣',
                    description: '经典扫雷游戏，三种难度，左键点开格子，右键插旗子标记地雷',
                    url: '/minesweeper',
                    tag: '游戏'
                }
            ]
        };

        // 读取 URL 参数
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'tools';

        // 验证分类类型
        if (!categoryInfo[type]) {
            document.getElementById('categoryName').textContent = '分类不存在';
            document.getElementById('categoryEmoji').textContent = '❌';
            document.getElementById('categoryEmoji2').textContent = '❌';
            document.getElementById('categoryDescription').textContent = '请返回首页重新选择';
        } else {
            // 更新页面标题和描述
            const info = categoryInfo[type];
            document.getElementById('pageTitle').textContent = `${info.name} - 项目集合`;
            document.getElementById('categoryName').textContent = info.name;
            document.getElementById('categoryEmoji').textContent = info.emoji;
            document.getElementById('categoryEmoji2').textContent = info.emoji;
            document.getElementById('categoryDescription').textContent = info.description;

            // 渲染项目卡片
            const grid = document.getElementById('projectGrid');
            const items = projects[type];
            items.forEach(p => {
                const card = document.createElement('a');
                card.href = p.url;
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="project-icon">${p.icon}</div>
                    <h2 class="project-title">${p.name}</h2>
                    <p class="project-description">${p.description}</p>
                    <div class="project-tag">${p.tag}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
