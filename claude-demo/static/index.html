<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 项目集合</title>
    <link rel="stylesheet" href="/static/home.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">
                <span class="title-emoji">🚀</span>
                项目展示
                <span class="title-emoji">🚀</span>
            </h1>
            <p class="subtitle">选择一个项目开始体验</p>
        </header>

        <main class="main">
            <div class="project-grid">
                <a href="/todo" class="project-card todo-card">
                    <div class="project-icon">📝</div>
                    <h2 class="project-title">待办清单</h2>
                    <p class="project-description">优雅的待办事项管理工具，支持增删改查、筛选和一键清空已完成</p>
                    <div class="project-tag">Web App</div>
                </a>

                <a href="/snake" class="project-card snake-card">
                    <div class="project-icon">🐍</div>
                    <h2 class="project-title">贪吃蛇</h2>
                    <p class="project-description">经典贪吃蛇小游戏，HTML5 Canvas 绘制，原生 JavaScript 实现</p>
                    <div class="project-tag">Game</div>
                </a>

                <a href="/sudoku" class="project-card sudoku-card">
                    <div class="project-icon">🔢</div>
                    <h2 class="project-title">数独</h2>
                    <p class="project-description">经典数独益智游戏，三种难度可选，自动生成题目，检查解答</p>
                    <div class="project-tag">Game</div>
                </a>
            </div>
        </main>

        <footer class="footer">
            <p>用 ❤️ 构建 with FastAPI + 原生 JavaScript</p>
        </footer>
    </div>
</body>
</html>
