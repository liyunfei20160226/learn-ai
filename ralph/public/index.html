<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线协作白板</title>
  <link rel="stylesheet" href="../src/style.css">
</head>
<body>
  <div id="app">
    <div id="toolbar" class="toolbar">
      <div class="tool-group">
        <button class="tool-btn" data-tool="select" title="选择">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
            <path d="M13 13l6 6"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="rectangle" title="矩形">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="ellipse" title="圆形/椭圆">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="diamond" title="菱形">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="12 2 21 12 12 22 3 12 12 2"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="line" title="直线">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="箭头">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="pencil" title="铅笔">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="text" title="文本">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9" y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="橡皮擦">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 4H8l-7 7 7 7h13l-7-7 7-7z"/>
          </svg>
        </button>
      </div>
      <div class="tool-group separator">
        <button class="tool-btn" data-tool="undo" title="撤销 (Ctrl+Z)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4v6h6"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="redo" title="重做 (Ctrl+Shift+Z)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4v6h-6"/>
            <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <div class="tool-group separator">
        <button class="tool-btn" data-tool="clear" title="清空画布">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="export" title="导出为 PNG 图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="canvas-container">
      <canvas id="whiteboard-canvas"></canvas>
    </div>
    <div id="style-panel" class="style-panel">
      <div class="panel-section">
        <label class="panel-label">笔触颜色</label>
        <input type="color" id="stroke-color" class="color-input">
      </div>
      <div class="panel-section">
        <label class="panel-label">填充颜色</label>
        <div class="fill-color-container">
          <input type="color" id="fill-color" class="color-input">
          <button id="fill-transparent" class="transparent-btn" title="设置透明填充">透明</button>
        </div>
      </div>
      <div class="panel-section">
        <label class="panel-label">线条粗细: <span id="line-width-value">2px</span></label>
        <input type="range" id="line-width" min="1" max="20" value="2" class="slider-input">
      </div>
      <div class="panel-section">
        <label class="panel-label">字体大小: <span id="font-size-value">16px</span></label>
        <input type="range" id="font-size" min="10" max="72" value="16" class="slider-input">
      </div>
    </div>
    <div id="collaboration-panel" class="collaboration-panel">
      <div class="panel-section">
        <div class="connection-status">
          <span class="status-label">协作</span>
          <span id="connection-status" class="status-indicator disconnected"></span>
          <span id="peer-count" class="peer-count"></span>
        </div>
      </div>
      <div class="panel-section" id="room-controls">
        <label class="panel-label">房间码</label>
        <div class="room-input-container">
          <input type="text" id="room-id" class="room-input" placeholder="例如: ABC123">
        </div>
        <div class="collab-buttons">
          <button id="create-room" class="collab-btn create">创建房间</button>
          <button id="join-room" class="collab-btn join">加入房间</button>
        </div>
      </div>
      <div class="panel-section" id="room-info" style="display: none;">
        <label class="panel-label">当前房间</label>
        <div class="room-code-display">
          <span id="current-room-code"></span>
          <button id="copy-room" class="icon-btn" title="复制房间码">📋</button>
        </div>
        <button id="leave-room" class="collab-btn leave">离开房间</button>
      </div>
      <div class="panel-section">
        <label class="panel-label">用户名</label>
        <input type="text" id="username" class="text-input" placeholder="你的名字">
      </div>
    </div>
  </div>
  <script type="module" src="../src/app.js"></script>
</body>
</html>
