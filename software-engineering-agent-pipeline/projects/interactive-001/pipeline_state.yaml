project_id: interactive-001
project_name: interactive-001
current_stage: requirements
original_user_requirement: 我要做一个待办事项网站，前端用next.js 后端用spring boot 数据库用postgres
requirements_spec: null
requirements_qa_history:
- question: 关于用户角色与权限：这是一个仅供个人使用的私人待办工具，还是需要支持多用户注册、登录及数据隔离的系统？是否需要区分管理员与普通用户？
  answer: 需要支持多用户注册、登录及数据隔离的系统，需要区分管理员与普通用户，管理员可以设置一些预制项目，比如待办事项的优先级选项
- question: 关于核心功能范围：除了基础的增删改查（创建、完成、删除任务）外，是否需要支持任务分类/标签、优先级设置、截止日期提醒或子任务功能？
  answer: 除了基础的增删改查（创建、完成、删除任务）外，要有优先级设置
- question: 关于部署与非功能需求：您预期的部署环境是什么（如云服务器、容器化部署等）？对系统的并发性能或数据安全性是否有特殊要求？
  answer: 本地部署，不需要考虑并发
- question: 关于任务与项目的关系：管理员设置的“预制项目”是指用户创建任务时必须从预设列表中选择所属项目，还是指系统预置一些默认的分类标签供用户参考，用户仍可自定义？
  answer: 是指一些默认的分类供用户选择，目前想在系统中预制待办事项的优先级，比如高/中/低，预制待办事项的预定标签，优先级用户不可以自定义，但标签用户可以自定义
- question: 关于提醒功能：虽然之前未提及截止日期，但既然有优先级设置，是否需要支持为任务设置“截止日期”，并在到期前通过站内信或邮件发送提醒？
  answer: 暂时不需要提醒功能
- question: 关于管理员权限边界：除了设置预制项目外，管理员是否还需要拥有查看全站所有用户任务、禁用违规用户账号等超级管理权限？
  answer: 是的，管理员需要拥有查看全站所有用户任务、禁用违规用户账号等超级管理权限
- question: 关于任务详情结构：除了名称、优先级、标签和所属项目外，任务是否还需要支持“详细描述/备注”字段？是否需要支持附件上传功能？
  answer: 暂时不需要
- question: 关于前端交互细节：在 Next.js 前端中，您期望的 UI 风格是偏向极简的个人工具风格，还是需要一套完整的后台管理系统界面（包含数据看板、用户管理表格等）供管理员使用？
  answer: 用户用极简风格，管理员则需要完整的后台管理系统界面
- question: 关于认证与安全：虽然部署在本地，但考虑到多用户和敏感数据，您希望采用哪种用户认证方式（如传统的账号密码 + Session/JWT，还是集成
    OAuth2 如 Google/GitHub 登录）？
  answer: 哪种方式更好一些？
- question: 针对本地部署且无需高并发的场景，建议采用'账号密码 + JWT'方案。该方案开发成本低、易于维护且完全满足安全隔离需求。您是否确认采纳此方案，暂不集成第三方
    OAuth2 登录？
  answer: 采用'账号密码 + JWT'方案
- question: 关于管理员的'查看全站任务'权限：这是指管理员可以在后台浏览所有数据的只读列表，还是也需要具备直接修改或删除任意用户任务的权限？
  answer: 需要具备直接修改或删除任意用户任务的权限
- question: 关于用户自定义标签：用户创建的标签是全局共享的（即用户 A 创建的标签，用户 B 也能看到并选用），还是严格隔离仅属于创建者个人？
  answer: 严格隔离仅属于创建者个人，管理员预设的标签则是全局共享的
- question: 关于任务状态流转：除了'未完成'和'已完成'两种状态外，是否需要支持'进行中'、'已取消'或'延期'等中间状态？还是仅通过一个布尔值（是否完成）来简单区分？
  answer: 需要支持'进行中'、'已取消'或'延期'等中间状态
- question: 关于数据持久化策略：对于用户标记为'已完成'的任务，系统是永久保留历史记录供随时查看，还是提供'归档'功能，或者允许用户/系统定期自动清理旧任务？
  answer: 永久保留历史记录供随时查看
- question: 关于管理员预设标签的扩展性：目前明确了管理员预设'优先级'和'标签'，后续是否还需要管理员预设其他全局字段（如任务类型、紧急程度等），还是目前的范围已固定？
  answer: 需要管理员预设其他全局字段，目前只有优先级和标签，后期可扩展
- question: 关于管理员预设的全局字段（如优先级、标签及未来扩展字段）：这些字段在系统运行后，管理员是否需要对已预设的选项进行修改（如重命名）或停用（使其不再对新任务可见，但历史数据保留），还是说一旦预设就不可变更？
  answer: 需要对已预设的选项进行修改（如重命名）或停用（使其不再对新任务可见，但历史数据保留）
- question: 关于任务的生命周期与状态流转：用户是否可以在任意状态间自由切换（例如直接从'未完成'跳到'已取消'，或从'已完成'恢复为'进行中'），还是说状态流转需要遵循特定的顺序限制（例如只有'进行中'的任务才能标记为'已完成'）？
  answer: 只有'进行中'的任务才能标记为'已完成'
- question: 关于前端技术栈细节：既然前端使用 Next.js，您更倾向于使用服务端渲染（SSR）以优化首屏加载和 SEO，还是因为主要是内部管理系统，使用静态生成（SSG）或纯客户端渲染（CSR）即可？
  answer: 哪种比较好
- question: 针对 Next.js 的渲染模式：考虑到这是一个内部管理系统且无需 SEO 优化，建议采用'客户端渲染 (CSR)'或'静态生成 (SSG)'以降低服务器负载并简化部署。您是否确认采纳此建议，放弃服务端渲染
    (SSR)？
  answer: 采用'客户端渲染 (CSR)'或'静态生成 (SSG)'
- question: 关于状态流转的逆向操作：既然规定只有'进行中'的任务才能标记为'已完成'，那么如果用户误操作将任务标记为'已完成'，是否允许将其回退到'进行中'状态？还是说一旦完成就不可逆转？
  answer: 允许将其回退到'进行中'状态
- question: 关于'延期'状态的触发机制：任务进入'延期'状态是必须由用户手动选择，还是系统需要根据'截止日期'自动判断？（注：第 5 轮已确认不需要提醒功能，但需确认是否有截止日期字段用于自动判定延期，或者延期
    purely 是手动标记）
  answer: 系统需要根据'截止日期'自动判断
- question: '"关于''延期''状态的自动判定：既然系统需根据''截止日期''自动判断延期，那么用户创建任务时是否必须填写''截止日期''？如果用户未填写日期，该任务是否永远无法进入''延期''状态？",'
  answer: 用户创建任务时是否必须填写'截止日期'
- question: '"关于''进行中''状态的触发：任务创建后的默认初始状态是''未完成''（待开始）还是直接进入''进行中''？用户是否需要一个明确的操作（如点击''开始''按钮）才能将任务从初始状态流转为''进行中''？",'
  answer: 任务创建后的默认初始状态是'未开始'，然后用户可以变成'进行中'，代表任务正式开始，需要一个明确的操作，比如点击开始
- question: '"关于''已取消''状态的流转限制：参考您对''已完成''状态的限制（只有进行中才能完成），''已取消''状态是否也有限制？例如，是否只有''未完成''或''进行中''的任务可以被取消，而''已完成''的任务不可取消？"'
  answer: 除了'已完成'的任务不可取消，其他状态均可被取消
- question: 关于第 22 轮的回答似乎遗漏了结论：用户创建任务时，'截止日期'字段是必填项还是选填项？（这将直接决定系统如何自动判定'延期'状态）
  answer: '''截止日期''字段是必填项'
- question: 关于数据导出与备份：考虑到是本地部署且永久保留历史数据，是否需要提供将用户任务数据导出为文件（如 CSV/Excel）的功能，或者定期的数据库自动备份机制？
  answer: 数据库自动备份机制
- question: 关于前端 UI 框架：为了加速开发并保持'极简风格'与'完整后台'的一致性，您是否有偏好的 UI 组件库（如 Ant Design, MUI,
    Shadcn/ui 等），还是由开发团队自行决定？
  answer: 你有好的UI组件库推荐么？
- question: 针对第 27 轮关于 UI 组件库的咨询：考虑到您需要同时实现'C 端极简风格’和'B 端完整后台’，推荐采用'Shadcn/ui'（基于
    Tailwind CSS，高度可定制，适合极简风）搭配其丰富的数据表格组件，或者'Ant Design'（功能最全，自带完整后台解决方案但风格偏重）。您更倾向于哪种方案？
  answer: 采用'Shadcn/ui'
- question: 关于多语言支持：该系统目前是否只需要支持中文，还是需要考虑国际化（i18n）以支持其他语言？
  answer: 需要考虑国际化
- question: 关于任务排序：在任务列表中，用户是否需要对任务进行自定义排序（如拖拽调整顺序），还是仅支持按创建时间、截止日期或优先级等固定规则自动排序？
  answer: 仅支持按创建时间、截止日期或优先级等固定规则自动排序
- question: '"关于国际化（i18n）的具体范围：系统初期需要支持哪些具体语言（例如：仅中文 + 英文，还是更多）？语言切换是全局生效（整个界面语言改变），还是允许不同用户设置不同的偏好语言？",'
  answer: 目前仅支持中文/英文/日文，默认中文，语言切换是全家生效，用户页面要有切换语言的设置，可供用户选择语言
- question: '"关于管理员对全局字段的管理界面：管理员需要在后台动态添加新的全局字段类型（如新增一个''风险等级''字段），还是目前仅需管理''优先级''和''标签''的具体选项值，字段类型的扩展留待后续代码迭代？",'
  answer: 管理员需要在后台动态添加新的全局字段类型
- question: '"关于''延期''状态的自动判定触发时机：系统是通过定时任务（如每小时扫描一次数据库）来更新过期任务的状态，还是仅在用户访问/刷新任务列表时实时计算并显示状态？"'
  answer: 仅在用户访问/刷新任务列表时实时计算并显示状态
- question: 关于全局字段的动态扩展：管理员在后台动态添加新的全局字段类型（如'风险等级'）时，是否需要支持自定义该字段的输入形式（例如：是单选下拉框、多选标签、还是文本输入框），还是系统默认所有新增字段均为某种固定类型？
  answer: 需要支持自定义该字段的输入形式
- question: 关于国际化资源管理：系统所需的中文/英文/日文翻译内容是硬编码在代码中由开发人员维护，还是需要提供后台界面让管理员动态编辑和更新翻译文案？
  answer: 暂时硬编码在代码中由开发人员维护
- question: 关于数据库自动备份策略：针对本地部署环境，您期望的自动备份频率是多少（如每天一次、每周一次）？备份文件是保留在本地服务器指定目录，还是需要自动同步到外部存储（如
    NAS、云存储）？
  answer: 每周一次，备份文件是保留在本地服务器指定目录
- question: '"关于全局字段的动态扩展：当管理员在后台新增一种全局字段类型（如''风险等级''）并定义其输入形式后，普通用户在创建或编辑任务时，前端界面是否能自动识别并渲染出对应的输入控件（如下拉框、多选框等），还是需要开发人员手动修改前端代码来适配新字段？",'
  answer: 前端界面能自动识别并渲染出对应的输入控件
- question: '"关于全局字段的值管理：对于管理员新增的全局字段，其具体的选项值（例如''风险等级''下的''高/中/低''）是由管理员在定义字段类型时一并预设并维护，还是允许用户在创建任务时自行输入新值（类似于标签的自定义逻辑）？",'
  answer: 由管理员在定义字段类型时一并预设并维护
- question: '"关于已停用全局选项的历史数据展示：之前确认管理员可以停用某些预设选项（使其对新任务不可见），那么对于历史任务中已经使用了该停用选项的数据，在前端展示时应如何处理？是显示原始名称、显示''已废弃''标记，还是禁止查看？"'
  answer: 若已停用，则前端不展示
- question: '"关于已停用全局选项的历史数据展示（修正确认）：在第 39 轮中您提到若选项已停用则''前端不展示''，这是否意味着历史任务中该字段的值将直接隐藏/留空，导致用户无法看到该任务当初设定的具体属性？还是说应该显示原始值但标记为''已废弃''以确保历史记录的完整性？",'
  answer: 前端该字段的值将直接隐藏/留空，但后端数据保留
- question: '"关于全局字段的必填性：管理员在定义新的全局字段类型时，是否需要设置该字段为''必填项''？即用户创建任务时，是否必须填写所有已启用的全局字段，还是允许留空？",'
  answer: 是否是必填项由管理员设定
- question: '"关于标签与全局字段的区分：目前系统已有''用户自定义标签''（隔离、自由文本）和''管理员预设标签''（全局、选项式），以及''动态全局字段''。请问''管理员预设标签''是否属于''动态全局字段''的一种特例（即输入形式为多选标签的字段），还是说它们是两套独立的体系？"'
  answer: 管理员预设标签是提供一些初始标签供用户选择，标签可以是多选项，如果用户觉得预制标签不太适合描述这个任务，则可以自定义这个任务的标签，可以是多个。比如，系统预制了：‘学习’，‘工作’，‘生活’三个标签，用户创建了某个任务，选择了‘生活’这个标签，又给这个任务加上了自己定义的标签‘健身’
- question: '"关于动态全局字段的显示顺序：当管理员添加了多个自定义全局字段（如优先级、风险等级等）后，这些字段在用户创建/编辑任务页面的展示顺序是如何确定的？是严格按照管理员创建的先后顺序，还是允许管理员在后台手动拖拽调整显示优先级？",'
  answer: 允许管理员在后台手动拖拽调整显示优先级
- question: '"关于任务列表的分页与加载：考虑到数据会永久保留且可能随时间积累大量历史记录，任务列表是采用分页加载（如每页 20 条），还是无限滚动加载？默认展示的是所有状态的任务，还是仅展示未完成/进行中的任务？",'
  answer: 任务列表是采用分页加载（如每页 20 条），可以过滤
- question: '"关于多语言切换的持久化：用户在前端切换语言（中/英/日）后，该偏好设置是否需要保存到用户个人配置中（即下次登录自动生效），还是仅在当前浏览器会话期间有效（刷新或重新登录即恢复默认）？"'
  answer: 需要保存到用户个人配置中
- question: '"关于动态全局字段的编辑限制：管理员在定义新字段时设定了''必填''属性，那么对于已经创建并包含该字段的历史任务，如果管理员后续将该字段从''必填''改为''选填''（或反之），系统是否需要强制用户去补全或允许清空已有数据，还是说该规则仅对修改规则后新创建的任务生效？",'
  answer: 该规则仅对修改规则后新创建的任务生效
- question: '"关于标签的重复性校验：对于用户自定义的标签，是否允许同一个用户创建名称完全相同的标签（例如用户不小心创建了两次''健身''）？系统是否需要在用户输入时进行实时查重并阻止重复创建？",'
  answer: 用户输入时进行实时查重并阻止重复创建
- question: '"关于''延期''状态的手动干预：虽然系统会根据截止日期自动判定''延期''，但如果用户手动将一个因过期而显示为''延期''的任务，强制修改状态为''进行中''或''已完成''，系统是否允许？还是说只要当前时间超过截止日期，该任务的状态就被锁定为''延期''不可更改？"'
  answer: '''延期''的任务可以改成已完成'
- question: '"关于动态全局字段的删除逻辑：管理员是否可以删除已创建的全局字段类型？如果允许删除，对于历史任务中已使用该字段的数据，是级联删除字段值、保留值但前端不再渲染，还是禁止删除含有数据的字段？",'
  answer: 允许删除，对于历史任务中已使用该字段的数据，前端不再渲染
- question: '"关于任务过滤功能的细节：用户在进行任务列表过滤时，除了按状态、优先级等基础字段过滤外，是否支持针对‘动态全局字段’（如管理员自定义的‘风险等级’）进行组合筛选？",'
  answer: 支持针对‘动态全局字段’（如管理员自定义的‘风险等级’）进行组合筛选，也可以按照任务名模糊查询
- question: '"关于管理员后台的国际化：管理员使用的完整后台管理系统界面，是否也需要支持中/英/日三语切换，还是仅固定为中文即可？"'
  answer: 否也需要支持中/英/日三语切换
- question: '"关于动态全局字段的唯一性：管理员在创建新的全局字段类型（如''风险等级''）时，是否需要校验字段名称的唯一性（即不允许存在两个同名字段），还是允许同名但通过其他标识区分？",'
  answer: 需要校验字段名称的唯一性
- question: '"关于任务附件的补充确认：此前第 7 轮确认暂时不需要附件上传功能，考虑到需求的完整性，是否确认在第一期版本中完全不包含任何文件/图片上传能力，后续版本再考虑？",'
  answer: 后续版本再考虑
