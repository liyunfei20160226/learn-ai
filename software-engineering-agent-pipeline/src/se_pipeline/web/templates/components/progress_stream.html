{% if current_node and current_node != '__end__' %}
<div class="bg-white rounded-2xl shadow-xl p-6 mb-8 animate-pulse" id="progress-container-inner">
    <h2 class="text-xl font-semibold text-gray-900 mb-4">
        <i class="fas fa-cog fa-spin text-blue-500 mr-2"></i>
        正在处理
    </h2>
    <div id="current-step" class="text-gray-600 mb-2">
        当前节点: <strong>{{ node_name_map[current_node] if current_node in node_name_map else current_node }}</strong>
    </div>
    <div id="current-document" class="text-sm text-gray-500 mb-4"></div>
    <div class="w-full bg-gray-200 rounded-full h-2.5 mt-4">
        <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-indigo-600 h-2.5 rounded-full" style="width: 10%"></div>
    </div>
</div>
<script>
// 启动 SSE 流式处理
const projectId = "{{ request.path_params.project_id }}";
const fromNode = "{{ current_node }}";

const eventSource = new EventSource('/projects/' + projectId + '/stream?from_node=' + fromNode);

eventSource.onmessage = function(event) {
    const data = JSON.parse(event.data);
    const currentStep = document.getElementById('current-step');
    const currentDoc = document.getElementById('current-document');
    const progressBar = document.getElementById('progress-bar');

    if (data.event === 'node_start') {
        if (currentStep) {
            const nodeName = data.data.name;
            currentStep.innerHTML = `正在运行: <strong>${nodeName}</strong>`;
        }
        if (progressBar) {
            progressBar.style.width = '50%';
        }
    } else if (data.event === 'document_progress') {
        if (currentDoc) {
            currentDoc.innerHTML = `<i class="fas fa-file-alt text-blue-400 mr-1"></i> 当前处理: ${data.data.current_file}`;
        }
    } else if (data.event === 'node_complete') {
        if (progressBar) {
            progressBar.style.width = '80%';
        }
    } else if (data.event === 'complete') {
        if (progressBar) {
            progressBar.style.width = '100%';
        }
        eventSource.close();
        // Refresh page to show new state
        window.location.reload();
    }
};

eventSource.onerror = function(error) {
    console.error('SSE error:', error);
    eventSource.close();
    document.getElementById('progress-container-inner').innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-2xl p-6">
            <h2 class="text-xl font-semibold text-red-800 mb-2">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                连接错误
            </h2>
            <p class="text-red-600">请检查 API 配置，刷新页面重试</p>
        </div>
    `;
};
</script>
{% else %}
<div class="mb-8">
</div>
{% endif %}
